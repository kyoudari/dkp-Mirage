<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DKP Manager — Guild</title>

  <!-- Fonts & libs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
    /* small custom tweaks */
    .card-hover:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(2,6,23,0.6); }
    .toast { position: fixed; right: 20px; bottom: 20px; z-index: 60; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <header class="flex items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold">DKP Manager</h1>
        <p class="text-sm text-slate-400">Управление DKP — быстро и удобно</p>
      </div>

      <div class="flex items-center gap-2">
        <input id="editorName" type="text" placeholder="Your nickname (officer)" class="px-3 py-2 rounded bg-slate-800 text-sm w-44" />
        <input id="githubToken" type="password" placeholder="GitHub Token (for PR)" class="px-3 py-2 rounded bg-slate-800 text-sm w-60" />
        <input id="repoInput" type="text" placeholder="owner/repo" class="px-3 py-2 rounded bg-slate-800 text-sm w-48" />
        <button id="openPRBtn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded text-sm">Create PR</button>
      </div>
    </header>

    <!-- Controls -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
      <div class="flex gap-2">
        <button id="addPlayerBtn" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded shadow-sm">Add player</button>
        <button id="importBtn" class="px-3 py-2 bg-amber-500 hover:bg-amber-400 rounded">Import</button>
        <button id="exportBtn" class="px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded">Export</button>
      </div>

      <div class="flex gap-2 items-center">
        <input id="searchInput" type="text" placeholder="Search nickname / class" class="px-3 py-2 rounded bg-slate-800 text-sm w-48" />
        <select id="sortSelect" class="px-3 py-2 rounded bg-slate-800 text-sm">
          <option value="dkp_desc">DKP ↓</option>
          <option value="dkp_asc">DKP ↑</option>
          <option value="nick_asc">Nickname A-Z</option>
        </select>
      </div>
    </div>

    <!-- Players grid -->
    <section>
      <div id="playersGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <!-- Transactions -->
    <section class="mt-6">
      <div class="bg-slate-800 rounded p-4">
        <h2 class="text-lg font-semibold mb-3">Give / Take DKP</h2>
        <form id="txForm" class="grid grid-cols-1 md:grid-cols-4 gap-2">
          <select id="txTarget" class="p-2 rounded bg-slate-900"></select>
          <input id="txAmount" type="number" placeholder="Amount (+/-)" class="p-2 rounded bg-slate-900" />
          <input id="txReason" placeholder="Reason" class="p-2 rounded bg-slate-900" />
          <button type="submit" class="px-4 py-2 bg-indigo-600 rounded">Apply</button>
        </form>
      </div>

      <div class="mt-4">
        <h3 class="text-lg font-semibold mb-2">Transactions</h3>
        <div id="txList" class="space-y-2 max-h-56 overflow-auto"></div>
      </div>
    </section>
  </div>

  <!-- Player modal -->
  <div id="modal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-60 hidden z-50">
    <div class="bg-slate-800 rounded p-5 w-full max-w-md">
      <h3 id="modalTitle" class="text-lg font-semibold mb-3">Add player</h3>
      <form id="playerForm" class="grid gap-2">
        <input id="p_nickname" class="p-2 rounded bg-slate-900" placeholder="Nickname" required />
        <input id="p_class" class="p-2 rounded bg-slate-900" placeholder="Class (DD / Heal / Tank)" />
        <input id="p_icon" class="p-2 rounded bg-slate-900" placeholder="Icon path (icons/Name.svg) — optional" />
        <input id="p_dkp" type="number" class="p-2 rounded bg-slate-900" placeholder="DKP" />
        <div class="flex justify-end gap-2 mt-3">
          <button type="button" id="modalCancel" class="px-3 py-1 bg-slate-600 rounded">Cancel</button>
          <button type="submit" id="modalSave" class="px-3 py-1 bg-emerald-600 rounded">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Player card template -->
  <template id="playerCardTpl">
    <div class="bg-slate-800 rounded p-4 card-hover transition-transform duration-200">
      <div class="flex items-center gap-3">
        <img class="w-14 h-14 rounded bg-slate-700 object-cover" src="" alt="icon" />
        <div class="flex-1">
          <div class="flex items-center justify-between">
            <div>
              <div class="font-semibold nickname"></div>
              <div class="text-sm text-slate-400 classRole"></div>
            </div>
            <div class="text-right">
              <div class="text-xl font-bold dkp"></div>
              <div class="text-xs text-slate-400">DKP</div>
            </div>
          </div>

          <div class="mt-3 flex gap-2">
            <button class="editBtn px-3 py-1 bg-amber-500 rounded text-sm">Edit</button>
            <button class="delBtn px-3 py-1 bg-red-600 rounded text-sm">Del</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- toast container -->
  <div id="toastRoot" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
