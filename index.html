<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DKP Manager — Guild</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">DKP Manager</h1>
      <div class="flex items-center gap-2">
        <input id="editorName" type="text" placeholder="Your nickname (officer)" class="px-2 py-1 rounded bg-gray-800 text-sm" />
        <input id="githubToken" type="password" placeholder="GitHub Token (for PR)" class="px-2 py-1 rounded bg-gray-800 text-sm" />
        <input id="repoInput" type="text" placeholder="owner/repo" class="px-2 py-1 rounded bg-gray-800 text-sm" />
        <button id="openPRBtn" class="px-3 py-1 bg-indigo-600 rounded text-sm">Create PR</button>
      </div>
    </header>

    <!-- Controls -->
    <div class="flex justify-between items-center mb-4 gap-4">
      <div class="flex gap-2">
        <button id="addPlayerBtn" class="px-3 py-1 bg-green-600 rounded">Add player</button>
        <button id="importBtn" class="px-3 py-1 bg-yellow-600 rounded">Import JSON</button>
        <button id="exportBtn" class="px-3 py-1 bg-gray-700 rounded">Export JSON</button>
      </div>
      <input id="searchInput" type="text" placeholder="Search nickname/class" class="px-2 py-1 rounded bg-gray-800" />
    </div>

    <!-- Players list -->
    <div id="playersList" class="space-y-3 mb-6"></div>

    <!-- Transaction form -->
    <div class="bg-gray-800 rounded p-4">
      <h2 class="text-lg font-semibold mb-2">Give / Take DKP</h2>
      <form id="txForm" class="grid grid-cols-1 md:grid-cols-4 gap-2">
        <select id="txTarget" class="p-2 rounded bg-gray-900"></select>
        <input id="txAmount" type="number" placeholder="Amount (+/-)" class="p-2 rounded bg-gray-900" />
        <input id="txReason" placeholder="Reason" class="p-2 rounded bg-gray-900" />
        <button type="submit" class="px-3 py-2 bg-indigo-600 rounded">Apply</button>
      </form>
    </div>

    <!-- Transactions log -->
    <div class="mt-6">
      <h3 class="text-lg font-semibold mb-2">Transactions</h3>
      <div id="txList" class="space-y-2 max-h-48 overflow-auto"></div>
    </div>
  </div>

  <!-- Player modal -->
  <div id="modal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden">
    <div class="bg-gray-800 rounded p-4 w-full max-w-md">
      <h3 id="modalTitle" class="text-lg font-semibold mb-2">Add player</h3>
      <form id="playerForm" class="grid gap-2">
        <input id="p_nickname" class="p-2 rounded bg-gray-900" placeholder="Nickname" required />
        <input id="p_class" class="p-2 rounded bg-gray-900" placeholder="Class (DD / Heal / Tank)" />
        <input id="p_icon" class="p-2 rounded bg-gray-900" placeholder="Icon path (icons/Name.svg) — optional" />
        <input id="p_dkp" type="number" class="p-2 rounded bg-gray-900" placeholder="DKP" />
        <div class="flex justify-end gap-2 mt-2">
          <button type="button" id="modalCancel" class="px-3 py-1 bg-gray-600 rounded">Cancel</button>
          <button type="submit" id="modalSave" class="px-3 py-1 bg-blue-600 rounded">Save</button>
        </div>
      </form>
    </div>
  </div>

  <template id="playerTpl">
    <div class="flex items-center justify-between p-3 bg-gray-900 rounded">
      <div class="flex items-center gap-3">
        <img class="w-12 h-12 rounded bg-gray-700 object-cover" src="" alt="icon" />
        <div>
          <div class="font-semibold nickname"></div>
          <div class="text-sm text-gray-400 classRole"></div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right">
          <div class="font-medium dkp"></div>
        </div>
        <div class="flex gap-2">
          <button class="editBtn px-2 py-1 bg-yellow-600 rounded text-sm">Edit</button>
          <button class="delBtn px-2 py-1 bg-red-600 rounded text-sm">Del</button>
        </div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
